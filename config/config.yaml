# Homelab Dashboard Configuration

app:
  name: "Homelab Dashboard"
  version: "2.0.0"
  debug: false

features:
  - Docker monitoring
  - Service status
  - Metrics
  - Alerts

tech_stack:
  - Docker SDK
  - FastAPI
  - WebSocket
  - Prometheus

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"
